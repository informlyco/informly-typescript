name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:


jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.14
          registry-url: 'https://registry.npmjs.org'
          
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Check if version already published
        if: github.event_name != 'workflow_dispatch'
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @informly/sdk@${VERSION} version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Get version (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # No build step — SDK is pre-compiled (cjs/ + esm/)
      # Auth via OIDC trusted publishing (configured on npmjs.com)
      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish --provenance --access public

      - name: Create GitHub release
        if: steps.check.outputs.skip != 'true'
        run: |
          gh release create "v${{ steps.check.outputs.version }}" \
            --title "v${{ steps.check.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
